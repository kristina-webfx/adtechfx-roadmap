name: Refresh AdTechFX Dashboard

on:
  schedule:
    # Every Monday at 8 AM ET (12:00 UTC)
    - cron: "0 12 * * 1"
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No extra pip installs needed — script uses stdlib only

      - name: Generate dashboard
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python generate_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: refresh AdTechFX dashboard [skip ci]"
          git push
