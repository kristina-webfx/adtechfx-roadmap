<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdTechFX Dashboard · MCPP</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
<style>
  /* ── Reset & base ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0E1623;
    --surface:   #142034;
    --card:      #1C2C48;
    --border:    #263A5F;
    --blue:      #207DE9;
    --blue-light:#84B9F5;
    --blue-pale: #CCE4FF;
    --text:      #F2F2F2;
    --muted:     #829DCE;
    --green:     #41D48C;
    --red:       #F04D50;
    --yellow:    #FFD12D;
    --orange:    #F7941D;
    --teal:      #4DC1B9;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Header ───────────────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  header .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header img.logo {
    height: 32px;
    display: block;
  }
  header .divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }
  header h1 {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  header h1 span { color: var(--blue); }
  .last-updated {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }

  /* ── Layout ───────────────────────────────────────────────────── */
  main { padding: 32px; max-width: 1400px; margin: 0 auto; }

  /* ── Stat cards ───────────────────────────────────────────────── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .stat-card .num {
    font-size: 36px;
    font-weight: 800;
    color: var(--blue-light);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-card .label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Section heads ────────────────────────────────────────────── */
  .section-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .section-head h2 {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .section-head .pill {
    background: var(--blue);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 9999px;
  }

  /* ── Priorities ───────────────────────────────────────────────── */
  .priorities-section { margin-bottom: 40px; }
  .priority-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .priority-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 8px;
    padding: 14px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .priority-item .rank {
    font-size: 11px;
    font-weight: 800;
    color: var(--blue);
    min-width: 20px;
    padding-top: 2px;
  }
  .priority-item .pri-title {
    font-weight: 600;
    font-size: 14px;
  }
  .priority-item .pri-note {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── Filter bar ───────────────────────────────────────────────── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 16px;
    align-items: center;
  }
  .filters input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9999px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    outline: none;
    width: 240px;
    transition: border-color .2s;
  }
  .filters input[type="text"]:focus { border-color: var(--blue); }
  .filters input[type="text"]::placeholder { color: var(--muted); }
  .filters select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9999px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    outline: none;
    cursor: pointer;
    transition: border-color .2s;
  }
  .filters select:focus { border-color: var(--blue); }
  .filters label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .filters input[type="checkbox"] { accent-color: var(--blue); width: 15px; height: 15px; cursor: pointer; }
  .result-count { font-size: 13px; color: var(--muted); margin-left: auto; }

  /* ── Issues table ─────────────────────────────────────────────── */
  .issues-section { margin-bottom: 48px; }
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--surface);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: rgba(32, 125, 233, 0.06); }
  tbody tr:nth-child(even) { background: rgba(255,255,255,.015); }
  tbody tr:nth-child(even):hover { background: rgba(32, 125, 233, 0.06); }
  td { padding: 12px 16px; vertical-align: middle; }
  td a {
    color: var(--blue-light);
    text-decoration: none;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    white-space: nowrap;
  }
  td a:hover { color: var(--blue); text-decoration: underline; }
  .summary-cell { max-width: 380px; }

  /* ── Status badge ─────────────────────────────────────────────── */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 9999px;
    white-space: nowrap;
  }
  .badge-todo       { background: rgba(130,157,206,.18); color: #b0c4de; }
  .badge-inprogress { background: rgba(32,125,233,.2);  color: var(--blue-light); }
  .badge-review     { background: rgba(77,193,185,.2);  color: var(--teal); }
  .badge-blocked    { background: rgba(240,77,80,.2);   color: #f88; }
  .badge-refinement { background: rgba(247,148,29,.15); color: var(--orange); }
  .badge-default    { background: rgba(130,157,206,.12); color: var(--muted); }

  /* ── Priority icon ────────────────────────────────────────────── */
  .pri { font-size: 13px; }

  /* ── Epic tag ─────────────────────────────────────────────────── */
  .epic-tag {
    display: inline-block;
    background: rgba(32,125,233,.15);
    color: var(--blue-light);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Empty state ──────────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 64px 32px;
    color: var(--muted);
    font-size: 15px;
  }

  /* ── Footer ───────────────────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 32px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  footer a { color: var(--blue); text-decoration: none; }
</style>
</head>

// ── Status → badge class ───────────────────────────────────────────────────
function badgeClass(status) {
  const s = status.toLowerCase();
  if (s.includes("progress"))   return "badge-inprogress";
  if (s.includes("review"))     return "badge-review";
  if (s.includes("blocked"))    return "badge-blocked";
  if (s.includes("refinement")) return "badge-refinement";
  if (s === "to do" || s === "open" || s === "backlog") return "badge-todo";
  return "badge-default";
}

// ── Build dropdowns ────────────────────────────────────────────────────────
function populateSelect(id, values) {
  const sel = document.getElementById(id);
  [...new Set(values)].filter(Boolean).sort().forEach(v => {
    const o = document.createElement("option");
    o.value = o.textContent = v;
    sel.appendChild(o);
  });
}

const priList = document.getElementById("priorityList");
if (PRIORITIES.length === 0) {
  priList.innerHTML = '<p style="color:var(--muted);font-size:13px">No priorities set. Edit <code>priorities.json</code> to add items.</p>';
} else {
  PRIORITIES.forEach((p, idx) => {
    priList.innerHTML += `
      <div class="priority-item">
        <span class="rank">#${idx + 1}</span>
        <div style="flex:1">
          <div class="pri-title">${p.title}</div>
          ${p.note ? `<div class="pri-note">${p.note}</div>` : ""}
        </div>
        ${p.month ? `<span class="badge badge-todo" style="margin-left:auto;white-space:nowrap">${p.month}</span>` : ""}
      </div>`;
  });
}

// ── Render rows ────────────────────────────────────────────────────────────
function renderRows(data) {
  const tbody = document.getElementById("issueTableBody");
  const empty = document.getElementById("emptyState");

  if (data.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    tbody.innerHTML = data.map(i => `
      <tr data-status="${i.status}" data-assignee="${i.assignee}" data-epic="${i.epic}">
        <td><a href="${i.url}" target="_blank">${i.key}</a></td>
        <td style="color:var(--muted);font-size:12px;white-space:nowrap">${i.type}</td>
        <td class="summary-cell">${escHtml(i.summary)}</td>
        <td><span class="badge ${badgeClass(i.status)}">${i.status}</span></td>
        <td style="white-space:nowrap;font-size:13px">${escHtml(i.assignee)}</td>
        <td>${i.epic ? `<span class="epic-tag" title="${escHtml(i.epic)}">${escHtml(i.epic)}</span>` : ""}</td>
        <td class="pri">${PRIORITY_ICONS[i.priority] || ""} <span style="font-size:11px;color:var(--muted)">${i.priority}</span></td>
        <td style="white-space:nowrap;color:var(--muted);font-size:12px">${i.created_display}</td>
      </tr>`).join("");
  }

  document.getElementById("visibleCount").textContent = data.length;
  document.getElementById("resultCount").textContent  = `${data.length} of ${ISSUES.length} issues`;
  updateStats(data);
}

function escHtml(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Filter logic ───────────────────────────────────────────────────────────
function applyFilters() {
  const q        = document.getElementById("searchInput").value.toLowerCase();
  const status   = document.getElementById("statusFilter").value;
  const assignee = document.getElementById("assigneeFilter").value;
  const epic     = document.getElementById("epicFilter").value;
  const hideBlk  = document.getElementById("hideBlocked").checked;

  const filtered = ISSUES.filter(i => {
    if (q && !i.summary.toLowerCase().includes(q) && !i.key.toLowerCase().includes(q)) return false;
    if (status   && i.status   !== status)   return false;
    if (assignee && i.assignee !== assignee) return false;
    if (epic     && i.epic     !== epic)     return false;
    if (hideBlk  && i.status.toLowerCase().includes("blocked")) return false;
    return true;
  });

  renderRows(filtered);
}

["searchInput","statusFilter","assigneeFilter","epicFilter"].forEach(id =>
  document.getElementById(id).addEventListener("input", applyFilters));
document.getElementById("hideBlocked").addEventListener("change", applyFilters);

// Initial render
renderRows(ISSUES);
</script>
</body>
</html>
